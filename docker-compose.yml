services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d appdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: "Host=db;Port=5432;Database=appdb;Username=app;Password=app"
      DOTNET_USE_POLLING_FILE_WATCHER: "1"
    ports:
      - "5080:8080"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./api:/src
      - dotnet_nuget:/root/.nuget
      - dp_keys:/root/.aspnet/DataProtection-Keys
    working_dir: /src

  ejabberd:
    image: ghcr.io/processone/ejabberd:latest
    environment:
      ERL_INETRC: /opt/ejabberd/conf/inetrc
    ports:
      - "5222:5222"
      - "5269:5269"
      - "5280:5280"
    volumes:
      - ./ejabberd/ejabberd.yml:/opt/ejabberd/conf/ejabberd.yml:ro
      - ./ejabberd/inetrc:/opt/ejabberd/conf/inetrc:ro
      - ejabberd_data:/opt/ejabberd/database
    networks:
      default:
        aliases:
          - chat.local
          - conference.chat.local
        ipv4_address: 172.26.0.10
    healthcheck:
      # ejabberdctl status uses Erlang distribution (RPC) which fails in Docker
      # due to hostname mismatch; the HTTP API on :5280 is equivalent and reliable.
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:5280/api/status"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s

  # One-shot container that registers XMPP accounts after ejabberd is ready
  ejabberd-setup:
    image: curlimages/curl:latest
    depends_on:
      ejabberd:
        condition: service_healthy
    restart: "no"
    command:
      - sh
      - -c
      - |
        curl -sf -X POST http://ejabberd:5280/api/register -H 'Content-Type: application/json' -d '{"user":"bridge-bot","host":"chat.local","password":"Bridge123!"}' || true
        curl -sf -X POST http://ejabberd:5280/api/register -H 'Content-Type: application/json' -d '{"user":"gajim-user-a","host":"chat.local","password":"Test123!"}' || true
        curl -sf -X POST http://ejabberd:5280/api/register -H 'Content-Type: application/json' -d '{"user":"gajim-user-b","host":"chat.local","password":"Test123!"}' || true
        echo 'ejabberd accounts ready'

  # Second ejabberd instance for S2S federation testing
  ejabberd-fed:
    image: ghcr.io/processone/ejabberd:latest
    environment:
      ERL_INETRC: /opt/ejabberd/conf/inetrc
    ports:
      - "5223:5222"   # expose on a different host port for Gajim
      - "5270:5269"
    volumes:
      - ./ejabberd/ejabberd-fed.yml:/opt/ejabberd/conf/ejabberd.yml:ro
      - ./ejabberd/inetrc:/opt/ejabberd/conf/inetrc:ro
      - ejabberd_fed_data:/opt/ejabberd/database
    networks:
      default:
        aliases:
          - fed.local
          - conference.fed.local
        ipv4_address: 172.26.0.11
    healthcheck:
      # ejabberdctl status uses Erlang distribution (RPC) which fails in Docker
      # due to hostname mismatch; the HTTP API on :5280 is equivalent and reliable.
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:5280/api/status"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s

  # One-shot container that registers accounts on the federation server
  ejabberd-fed-setup:
    image: curlimages/curl:latest
    depends_on:
      ejabberd-fed:
        condition: service_healthy
    restart: "no"
    command:
      - sh
      - -c
      - |
        curl -sf -X POST http://ejabberd-fed:5280/api/register -H 'Content-Type: application/json' -d '{"user":"gajim-user-fed","host":"fed.local","password":"Test123!"}' || true
        echo 'ejabberd-fed accounts ready'

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    environment:
      VITE_API_URL: http://localhost:5080
    ports:
      - "5173:5173"
    volumes:
      - ./web:/app
      - /app/node_modules
    depends_on:
      - api

volumes:
  pgdata:
  dotnet_nuget:
  dp_keys:
  ejabberd_data:
  ejabberd_fed_data:

networks:
  default:
    ipam:
      config:
        - subnet: 172.26.0.0/24
